<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="1000" height="760" fill="#1e1e2e" rx="12"/>

  <!-- Title -->
  <text x="500" y="34" fill="#cdd6f4" font-size="16" font-weight="bold" text-anchor="middle">PetCollar-X1 接線圖 ─ EVM-BT40 + ADXL345 + MAX30100 + DS18B20</text>

  <!-- EVM-BT40 Board -->
  <rect x="20" y="52" width="190" height="510" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="115" y="76" fill="#89b4fa" font-size="13" font-weight="bold" text-anchor="middle">EVM-BT40</text>
  <text x="115" y="92" fill="#6c7086" font-size="10" text-anchor="middle">nRF5340</text>

  <!-- EVM pins (right side at x=210) -->
  <circle cx="210" cy="130" r="6" fill="#f38ba8"/>
  <rect x="202" y="124" width="16" height="12" rx="2" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="196" y="129" fill="#f38ba8" font-size="11" text-anchor="end">3.3V</text>

  <circle cx="210" cy="175" r="6" fill="#6c7086"/>
  <rect x="202" y="169" width="16" height="12" rx="2" fill="none" stroke="#6c7086" stroke-width="1.5"/>
  <text x="196" y="174" fill="#a6adc8" font-size="11" text-anchor="end">GND</text>

  <circle cx="210" cy="282" r="6" fill="#a6e3a1"/>
  <rect x="202" y="276" width="16" height="12" rx="2" fill="none" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="196" y="279" fill="#a6e3a1" font-size="11" text-anchor="end">D14</text>
  <text x="196" y="291" fill="#6c7086" font-size="9" text-anchor="end">SDA / P1.02</text>

  <circle cx="210" cy="338" r="6" fill="#89dceb"/>
  <rect x="202" y="332" width="16" height="12" rx="2" fill="none" stroke="#89dceb" stroke-width="1.5"/>
  <text x="196" y="335" fill="#89dceb" font-size="11" text-anchor="end">D15</text>
  <text x="196" y="347" fill="#6c7086" font-size="9" text-anchor="end">SCL / P1.03</text>

  <circle cx="210" cy="432" r="6" fill="#f9e2af"/>
  <rect x="202" y="426" width="16" height="12" rx="2" fill="none" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="196" y="429" fill="#f9e2af" font-size="11" text-anchor="end">D2</text>
  <text x="196" y="441" fill="#6c7086" font-size="9" text-anchor="end">1-Wire / P1.04</text>

  <!-- ADXL345 -->
  <rect x="628" y="52" width="220" height="285" rx="10" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
  <text x="738" y="76" fill="#cba6f7" font-size="13" font-weight="bold" text-anchor="middle">ADXL345</text>
  <text x="738" y="92" fill="#6c7086" font-size="10" text-anchor="middle">Breakout (I&#xB2;C)  addr: 0x53</text>

  <circle cx="628" cy="120" r="6" fill="#f38ba8"/>
  <rect x="620" y="114" width="16" height="12" rx="2" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="652" y="125" fill="#f38ba8" font-size="11">VCC</text>

  <circle cx="628" cy="160" r="6" fill="#6c7086"/>
  <rect x="620" y="154" width="16" height="12" rx="2" fill="none" stroke="#6c7086" stroke-width="1.5"/>
  <text x="652" y="165" fill="#a6adc8" font-size="11">GND</text>

  <circle cx="628" cy="200" r="6" fill="#a6e3a1"/>
  <rect x="620" y="194" width="16" height="12" rx="2" fill="none" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="652" y="205" fill="#a6e3a1" font-size="11">SDA</text>

  <circle cx="628" cy="242" r="6" fill="#89dceb"/>
  <rect x="620" y="236" width="16" height="12" rx="2" fill="none" stroke="#89dceb" stroke-width="1.5"/>
  <text x="652" y="247" fill="#89dceb" font-size="11">SCL</text>

  <circle cx="628" cy="284" r="6" fill="#fab387"/>
  <rect x="620" y="278" width="16" height="12" rx="2" fill="none" stroke="#fab387" stroke-width="1.5"/>
  <text x="652" y="283" fill="#fab387" font-size="11">CS &#x2192; 3.3V</text>
  <text x="652" y="295" fill="#6c7086" font-size="9">&#x26A0; 必接！不接 = SPI 模式，I&#xB2;C 不通</text>

  <circle cx="628" cy="320" r="6" fill="#6c7086"/>
  <rect x="620" y="314" width="16" height="12" rx="2" fill="none" stroke="#6c7086" stroke-width="1.5"/>
  <text x="652" y="322" fill="#a6adc8" font-size="11">SDO &#x2192; GND</text>
  <text x="652" y="334" fill="#6c7086" font-size="9">addr=0x53（接3.3V則=0x1D）</text>

  <!-- MAX30100 -->
  <rect x="628" y="362" width="220" height="185" rx="10" fill="#313244" stroke="#f5c2e7" stroke-width="2"/>
  <text x="738" y="386" fill="#f5c2e7" font-size="13" font-weight="bold" text-anchor="middle">MAX30100</text>
  <text x="738" y="401" fill="#6c7086" font-size="10" text-anchor="middle">Breakout (I&#xB2;C)  addr: 0x57</text>

  <circle cx="628" cy="424" r="6" fill="#f38ba8"/>
  <rect x="620" y="418" width="16" height="12" rx="2" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="652" y="429" fill="#f38ba8" font-size="11">VIN</text>

  <circle cx="628" cy="462" r="6" fill="#6c7086"/>
  <rect x="620" y="456" width="16" height="12" rx="2" fill="none" stroke="#6c7086" stroke-width="1.5"/>
  <text x="652" y="467" fill="#a6adc8" font-size="11">GND</text>

  <circle cx="628" cy="498" r="6" fill="#a6e3a1"/>
  <rect x="620" y="492" width="16" height="12" rx="2" fill="none" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="652" y="503" fill="#a6e3a1" font-size="11">SDA</text>

  <circle cx="628" cy="532" r="6" fill="#89dceb"/>
  <rect x="620" y="526" width="16" height="12" rx="2" fill="none" stroke="#89dceb" stroke-width="1.5"/>
  <text x="652" y="537" fill="#89dceb" font-size="11">SCL</text>

  <!-- DS18B20 -->
  <rect x="628" y="572" width="220" height="155" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
  <text x="738" y="596" fill="#f9e2af" font-size="13" font-weight="bold" text-anchor="middle">DS18B20</text>
  <text x="738" y="611" fill="#6c7086" font-size="10" text-anchor="middle">防水探針 (1-Wire)</text>

  <circle cx="628" cy="630" r="6" fill="#f38ba8"/>
  <rect x="620" y="624" width="16" height="12" rx="2" fill="none" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="652" y="635" fill="#f38ba8" font-size="11">紅線 (VCC)</text>

  <circle cx="628" cy="662" r="6" fill="#6c7086"/>
  <rect x="620" y="656" width="16" height="12" rx="2" fill="none" stroke="#6c7086" stroke-width="1.5"/>
  <text x="652" y="667" fill="#a6adc8" font-size="11">黑線 (GND)</text>

  <circle cx="628" cy="696" r="6" fill="#f9e2af"/>
  <rect x="620" y="690" width="16" height="12" rx="2" fill="none" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="652" y="701" fill="#f9e2af" font-size="11">黃線 (DQ/Data)</text>

  <!-- 4.7k Resistor -->
  <rect x="378" y="672" width="100" height="40" rx="6" fill="#45475a" stroke="#fab387" stroke-width="2"/>
  <text x="428" y="689" fill="#fab387" font-size="13" font-weight="bold" text-anchor="middle">4.7 k&#x3A9;</text>
  <text x="428" y="703" fill="#6c7086" font-size="9" text-anchor="middle">上拉電阻</text>
  <circle cx="378" cy="692" r="5" fill="#fab387"/>
  <circle cx="478" cy="692" r="5" fill="#fab387"/>
  <circle cx="548" cy="692" r="5" fill="#f9e2af"/>

  <!-- WIRES -->
  <!-- 3.3V BUS red, vertical at x=262 -->
  <line x1="210" y1="130" x2="262" y2="130" stroke="#f38ba8" stroke-width="2.5"/>
  <line x1="262" y1="120" x2="262" y2="692" stroke="#f38ba8" stroke-width="2.5"/>
  <line x1="262" y1="120" x2="628" y2="120" stroke="#f38ba8" stroke-width="2.5"/>
  <line x1="262" y1="424" x2="628" y2="424" stroke="#f38ba8" stroke-width="2.5"/>
  <line x1="262" y1="630" x2="628" y2="630" stroke="#f38ba8" stroke-width="2.5"/>
  <line x1="262" y1="284" x2="628" y2="284" stroke="#fab387" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="262" y1="692" x2="378" y2="692" stroke="#fab387" stroke-width="2.5"/>

  <!-- GND BUS gray, vertical at x=292 -->
  <line x1="210" y1="175" x2="292" y2="175" stroke="#a6adc8" stroke-width="2.5"/>
  <line x1="292" y1="160" x2="292" y2="662" stroke="#a6adc8" stroke-width="2.5"/>
  <line x1="292" y1="160" x2="628" y2="160" stroke="#a6adc8" stroke-width="2.5"/>
  <line x1="292" y1="320" x2="628" y2="320" stroke="#a6adc8" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="292" y1="462" x2="628" y2="462" stroke="#a6adc8" stroke-width="2.5"/>
  <line x1="292" y1="662" x2="628" y2="662" stroke="#a6adc8" stroke-width="2.5"/>

  <!-- SDA green -->
  <line x1="210" y1="282" x2="340" y2="282" stroke="#a6e3a1" stroke-width="2.5"/>
  <line x1="340" y1="200" x2="340" y2="498" stroke="#a6e3a1" stroke-width="2.5"/>
  <line x1="340" y1="200" x2="628" y2="200" stroke="#a6e3a1" stroke-width="2.5"/>
  <line x1="340" y1="498" x2="628" y2="498" stroke="#a6e3a1" stroke-width="2.5"/>

  <!-- SCL cyan -->
  <line x1="210" y1="338" x2="362" y2="338" stroke="#89dceb" stroke-width="2.5"/>
  <line x1="362" y1="242" x2="362" y2="532" stroke="#89dceb" stroke-width="2.5"/>
  <line x1="362" y1="242" x2="628" y2="242" stroke="#89dceb" stroke-width="2.5"/>
  <line x1="362" y1="532" x2="628" y2="532" stroke="#89dceb" stroke-width="2.5"/>

  <!-- 1-Wire yellow -->
  <line x1="210" y1="432" x2="548" y2="432" stroke="#f9e2af" stroke-width="2.5"/>
  <line x1="548" y1="432" x2="548" y2="692" stroke="#f9e2af" stroke-width="2.5"/>
  <line x1="478" y1="692" x2="548" y2="692" stroke="#f9e2af" stroke-width="2.5"/>
  <line x1="548" y1="692" x2="548" y2="696" stroke="#f9e2af" stroke-width="2.5"/>
  <line x1="548" y1="696" x2="628" y2="696" stroke="#f9e2af" stroke-width="2.5"/>

  <!-- Legend -->
  <rect x="20" y="720" width="600" height="30" rx="6" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <line x1="35" y1="735" x2="60" y2="735" stroke="#f38ba8" stroke-width="2.5"/>
  <text x="65" y="739" fill="#a6adc8" font-size="10">3.3V</text>
  <line x1="105" y1="735" x2="130" y2="735" stroke="#a6adc8" stroke-width="2.5"/>
  <text x="135" y="739" fill="#a6adc8" font-size="10">GND</text>
  <line x1="175" y1="735" x2="200" y2="735" stroke="#a6e3a1" stroke-width="2.5"/>
  <text x="205" y="739" fill="#a6adc8" font-size="10">SDA</text>
  <line x1="240" y1="735" x2="265" y2="735" stroke="#89dceb" stroke-width="2.5"/>
  <text x="270" y="739" fill="#a6adc8" font-size="10">SCL</text>
  <line x1="305" y1="735" x2="330" y2="735" stroke="#f9e2af" stroke-width="2.5"/>
  <text x="335" y="739" fill="#a6adc8" font-size="10">1-Wire Data</text>
  <line x1="415" y1="735" x2="440" y2="735" stroke="#fab387" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="445" y="739" fill="#a6adc8" font-size="10">CS/SDO (必接)</text>

</svg>